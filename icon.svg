<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#111418"/>
  
  <!-- Rock hold - angular climbing hold shape -->
  <polygon points="140,400 180,340 260,320 340,340 372,400 300,420 200,420" fill="#2a3040"/>
  <polygon points="160,400 190,350 260,332 330,350 355,400" fill="#3a4559"/>
  <!-- Hold texture highlight -->
  <polygon points="200,370 230,345 280,340 310,358 290,375 220,378" fill="#4a5570" opacity="0.6"/>

  <!-- Hand silhouette gripping the hold -->
  <!-- Palm -->
  <ellipse cx="256" cy="310" rx="72" ry="58" fill="#e8793a"/>
  
  <!-- Thumb - angled out to the left -->
  <ellipse cx="175" cy="295" rx="22" ry="38" fill="#e8793a" transform="rotate(-35 175 295)"/>
  
  <!-- Index finger -->
  <rect x="218" y="190" width="30" height="115" rx="15" fill="#e8793a"/>
  
  <!-- Middle finger - tallest -->
  <rect x="256" y="172" width="30" height="130" rx="15" fill="#e8793a"/>
  
  <!-- Ring finger -->
  <rect x="294" y="185" width="28" height="118" rx="14" fill="#e8793a"/>
  
  <!-- Pinky -->
  <rect x="328" y="205" width="24" height="100" rx="12" fill="#e8793a"/>

  <!-- Knuckle highlights -->
  <ellipse cx="233" cy="205" rx="12" ry="8" fill="#c85e25" opacity="0.5"/>
  <ellipse cx="271" cy="188" rx="12" ry="8" fill="#c85e25" opacity="0.5"/>
  <ellipse cx="308" cy="200" rx="11" ry="7" fill="#c85e25" opacity="0.5"/>
  <ellipse cx="340" cy="218" rx="9" ry="6" fill="#c85e25" opacity="0.5"/>

  <!-- Wrist -->
  <rect x="215" y="340" width="82" height="55" rx="8" fill="#e8793a"/>

  <!-- Chalk dust effect - small dots -->
  <circle cx="195" cy="230" r="3" fill="#ede8df" opacity="0.3"/>
  <circle cx="185" cy="255" r="2" fill="#ede8df" opacity="0.25"/>
  <circle cx="340" cy="245" r="2.5" fill="#ede8df" opacity="0.25"/>
  <circle cx="355" cy="225" r="2" fill="#ede8df" opacity="0.2"/>
  <circle cx="172" cy="275" r="1.5" fill="#ede8df" opacity="0.2"/>
</svg>
